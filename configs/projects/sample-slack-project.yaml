project_id: sample-slack-project
name: Sample Slack Project
description: Sample multi-agent software project configured for Slack.
chat_platform: slack
workspace_path: workspaces/sample-slack-project
execution_backend: cli
repo:
  url: https://github.com/example/sample-slack-project
  default_branch: main
  provider: github
channel_bindings:
  ai-council:
    domain: ai-council
    channel_id: C_AI_COUNCIL
    thread_enabled: true
  ai-ops:
    domain: ai-ops
    channel_id: C_AI_OPS
    thread_enabled: true
  user-control:
    domain: user-control
    channel_id: C_USER_CONTROL
    thread_enabled: true
agent_mapping:
  representative:
    role: representative
    provider: claude
    model: claude-sonnet
  planner:
    role: planner
    provider: gemini
    model: gemini-pro
  scout:
    role: scout
    provider: gemini
    model: gemini-pro
  builder:
    role: builder
    provider: codex
    model: codex-latest
  critic:
    role: critic
    provider: claude
    model: claude-sonnet
  tester:
    role: tester
    provider: gemini
    model: gemini-pro
commands:
  plan: python -m pytest -q
  build: docker compose build
  test: pytest
  lint: python -m compileall .
  fix: pytest -x
rules:
  - rule_id: require-auth-approval
    condition: auth
    action: require_approval
  - rule_id: require-db-approval
    condition: schema
    action: require_approval
  - rule_id: require-delete-approval
    condition: delete
    action: require_approval
metadata:
  slack:
    transport_mode: socket_mode
    allowlist_policy: project-scoped
