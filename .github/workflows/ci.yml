name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check apps packages tests

      - name: Compile Python sources
        run: python -m compileall apps packages

      - name: Run tests
        run: pytest

      - name: Validate Docker build
        run: docker build -f infra/Dockerfile .
